name = "withmemory-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Bundle .txt files as text modules so they can be imported as strings
[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = false

